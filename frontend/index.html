    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "offers": {
          "@type": "Offer",

          "AI food recommendations",

    <!-- FAQ Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How does MoodFood work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "MoodFood uses AI to give you personalized food recommendations based on your mood, cravings, budget, and dietary preferences. Choose a game mode (Classic Quiz, Swipe & Vibe, or Meal Roulette), answer a few questions, and get 3 curated meal picks with healthier swaps and budget alternatives."
            }
          },
          {
            "@type": "Question",
            "name": "Is MoodFood free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, MoodFood is completely free to use. You can get AI-powered food recommendations without any cost or subscription."
            }
          },
          {
            "@type": "Question",
            "name": "What game modes does MoodFood offer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "MoodFood offers three game modes: Classic Quiz (4-question mood quiz), Swipe & Vibe (Tinder-style food card swiping), and Meal Roulette (spin to land on a food vibe with confetti celebration)."
            }
          },
          {
            "@type": "Question",
            "name": "Can I get healthier food alternatives?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! Every recommendation comes with a Healthier Swap option (marked with 🥦) and a Budget Pick alternative (marked with 💰) so you can make the best choice for your needs."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to get recommendations?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "From 'I'm hungry' to eating in 90 seconds. MoodFood delivers personalized AI food recommendations in under 2 minutes."
            }
          }
        ]
      }
    </script>
